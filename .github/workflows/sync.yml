name: Upstream Sync

# First-class fork maintenance: mirror upstream and rebase the rails.
#
#   vendor/upstream  <- fast-forwarded to 1jehuang/jcode master
#   distro/nix       <- rebased onto vendor/upstream   (packaging + CI layer)
#   main             <- rebased onto distro/nix        (custom fork layer)
#
# Recurring downstream-vs-upstream conflicts self-heal via the shared
# `git rerere` cache (.rerere-cache/, scripts/rerere-cache.sh). A genuinely
# NEW conflict fails loudly and opens/updates a `sync-blocked` issue so a
# human resolves it once, exports the recording, and commits it.
#
# NOTE: scheduled workflows execute from the default branch (`main`), so the
# helper scripts referenced here (scripts/rerere-*.sh, scripts/fork-health.sh)
# resolve from main's checkout. Dispatch this workflow on `main` only.

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  # Pushes made with GITHUB_TOKEN do not fire `push` workflows (recursion
  # guard), so after a real sync this job explicitly dispatches validation.
  actions: write

concurrency:
  group: upstream-sync
  cancel-in-progress: false

jobs:
  sync:
    name: sync rails
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Sync vendor/upstream, distro/nix, and main
        id: sync
        run: |
          set -euo pipefail

          upstream_url="https://github.com/1jehuang/jcode.git"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch --prune origin vendor/upstream distro/nix main
          git remote add upstream "$upstream_url" 2>/dev/null || git remote set-url upstream "$upstream_url"
          git fetch --prune upstream master

          old_vendor="$(git rev-parse origin/vendor/upstream)"
          old_distro="$(git rev-parse origin/distro/nix)"
          old_main="$(git rev-parse origin/main)"
          new_vendor="$(git rev-parse upstream/master)"

          # Fast no-op path: upstream unchanged and the stack is already
          # consistent. Skips the worktree machinery entirely so the 6h cron
          # is cheap and its history is legible (short green runs = no-ops).
          if [ "$new_vendor" = "$old_vendor" ] \
            && git merge-base --is-ancestor "$old_vendor" "$old_distro" \
            && git merge-base --is-ancestor "$old_distro" "$old_main"; then
            echo "Rails already in sync with upstream ($new_vendor); nothing to do."
            echo "## Upstream sync: no-op (already in sync)" >> "$GITHUB_STEP_SUMMARY"
            echo "outcome=noop" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Enable rerere and import the repo's shared recorded conflict
          # resolutions so recurring downstream-vs-upstream conflicts replay
          # automatically. A genuinely NEW conflict still fails the job loudly
          # (rerere-rebase.sh aborts non-zero) so a human resolves it once.
          git config rerere.enabled true
          git config rerere.autoupdate true
          if [ -x scripts/rerere-cache.sh ]; then
            scripts/rerere-cache.sh import || true
          fi

          tmp="$(mktemp -d)"
          trap 'git worktree remove --force "$tmp/distro" >/dev/null 2>&1 || true; git worktree remove --force "$tmp/main" >/dev/null 2>&1 || true; rm -rf "$tmp"' EXIT

          git worktree add --detach "$tmp/distro" origin/distro/nix
          scripts/rerere-rebase.sh "$tmp/distro" upstream/master
          new_distro="$(git -C "$tmp/distro" rev-parse HEAD)"

          git worktree add --detach "$tmp/main" origin/main
          scripts/rerere-rebase.sh "$tmp/main" "$new_distro" "$old_distro"
          new_main="$(git -C "$tmp/main" rev-parse HEAD)"

          if [ "$new_vendor" != "$old_vendor" ]; then
            git push --force-with-lease=refs/heads/vendor/upstream:"$old_vendor" origin "$new_vendor":refs/heads/vendor/upstream
          else
            echo "vendor/upstream already matches upstream/master."
          fi

          if [ "$new_distro" != "$old_distro" ]; then
            git -C "$tmp/distro" push --force-with-lease=refs/heads/distro/nix:"$old_distro" origin HEAD:refs/heads/distro/nix
          else
            echo "distro/nix already rebased on current vendor/upstream."
          fi

          if [ "$new_main" != "$old_main" ]; then
            git -C "$tmp/main" push --force-with-lease=refs/heads/main:"$old_main" origin HEAD:refs/heads/main
          else
            echo "main already rebased on current distro/nix."
          fi

          {
            echo "## Upstream sync"
            echo "- vendor/upstream: \`${old_vendor:0:12}\` -> \`${new_vendor:0:12}\`"
            echo "- distro/nix: \`${old_distro:0:12}\` -> \`${new_distro:0:12}\`"
            echo "- main: \`${old_main:0:12}\` -> \`${new_main:0:12}\`"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "outcome=synced" >> "$GITHUB_OUTPUT"

      - name: Verify rail health after sync
        if: steps.sync.outputs.outcome == 'synced'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch --prune origin vendor/upstream distro/nix main
          scripts/fork-health.sh --repo "$GITHUB_REPOSITORY" \
            --fork-remote origin --upstream-remote upstream

      - name: Dispatch validation on the synced rails
        if: steps.sync.outputs.outcome == 'synced'
        env:
          GH_TOKEN: ${{ github.token }}
        # GITHUB_TOKEN pushes suppress `push`-triggered workflows (GitHub's
        # recursion guard), so the rebased rails would otherwise land
        # unvalidated. Dispatch the gates explicitly.
        run: |
          gh workflow run "Fork CI" --repo "$GITHUB_REPOSITORY" --ref main || true
          gh workflow run "Nix" --repo "$GITHUB_REPOSITORY" --ref main || true

      - name: Open or update the sync-blocked issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Upstream sync blocked: manual conflict resolution needed"
          body="The scheduled upstream sync failed on a conflict with no recorded rerere resolution (or a rail health violation).

          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          To fix:
          1. \`scripts/sync-local.sh\` (rebases the rails locally; the new conflict will reproduce)
          2. Resolve it once, then \`scripts/rerere-cache.sh export\` and commit \`.rerere-cache/\`
          3. Push the rails and re-dispatch this workflow"
          # Ensure the label exists so the create below never fails on a fresh
          # fork or if the label was deleted; best-effort, never fatal.
          gh label create fork-maintenance \
            --description "Automated fork rail maintenance (sync, health, advisories)" \
            --color 0e8a16 2>/dev/null || true
          existing="$(gh issue list --state open --search "in:title \"Upstream sync blocked\"" --json number --jq '.[0].number // empty')"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "Still failing: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            # Create the issue first (must succeed), then attach the label
            # best-effort so a labeling hiccup can never suppress the alert.
            # gh issue create prints the new issue URL on success.
            url="$(gh issue create --title "$title" --body "$body")"
            [ -n "$url" ] && gh issue edit "$url" --add-label fork-maintenance 2>/dev/null || true
          fi

      - name: Close the sync-blocked issue on success
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing="$(gh issue list --state open --search "in:title \"Upstream sync blocked\"" --json number --jq '.[0].number // empty')"
          if [ -n "$existing" ]; then
            gh issue close "$existing" --comment "Sync succeeded: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
