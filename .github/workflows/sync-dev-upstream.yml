name: Sync master and rebase dev

on:
  workflow_dispatch:
  schedule:
    # Runs from the repository's default branch, expected to be origin/master.
    - cron: "17 * * * *"
  push:
    branches: [master]
    # Retry after a human/Copilot fix lands on master, but do not rerun for
    # this workflow's own maintenance-only edits.
    paths-ignore:
      - ".github/workflows/sync-dev-upstream.yml"

permissions:
  contents: write
  issues: write

concurrency:
  group: sync-master-and-rebase-dev
  cancel-in-progress: false

jobs:
  sync-and-rebase:
    name: Validate upstream merge, update master, then rebase dev
    # Avoid a recursive run when this workflow pushes to master with the
    # github-actions bot identity. Human/Copilot PR merges still run.
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch origin and upstream
        run: |
          git remote add upstream https://github.com/1jehuang/jcode.git
          git fetch origin master dev --prune
          git fetch upstream master --prune

      - name: Merge upstream/master into candidate master
        run: |
          git checkout -B candidate-master origin/master
          if git merge --no-edit upstream/master; then
            echo "candidate merge ok"
          else
            echo "::error::Conflict while merging upstream/master into origin/master. Resolve master manually, then rerun this workflow."
            git merge --abort || true
            exit 1
          fi

      - name: Validate candidate master build
        run: |
          nix develop --command cargo build --profile selfdev -p jcode --bin jcode

      - name: Push updated master only after successful build
        run: |
          if git diff --quiet origin/master..HEAD; then
            echo "origin/master already contains upstream/master"
          else
            git push origin HEAD:master
          fi

      - name: Rebase dev onto validated master
        run: |
          git fetch origin master dev --prune
          git checkout -B dev origin/dev
          if git rebase origin/master; then
            echo "dev rebase ok"
          else
            echo "::error::Conflict while rebasing dev onto origin/master. Resolve locally, force-push dev with --force-with-lease, then rerun this workflow."
            git rebase --abort || true
            exit 1
          fi

      - name: Validate rebased dev build
        run: |
          nix develop --command cargo build --profile selfdev -p jcode --bin jcode

      - name: Push rebased dev only after successful build
        run: |
          if git diff --quiet origin/dev..HEAD; then
            echo "dev is already based on origin/master"
          else
            git push --force-with-lease origin HEAD:dev
          fi

      - name: Open Copilot fix issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          title="Fix failed upstream sync for dev"
          existing=$(gh issue list --state open --search "repo:${{ github.repository }} in:title \"$title\"" --json number --jq '.[0].number // empty')
          body_file=$(mktemp)
          cat > "$body_file" <<EOF
          The scheduled upstream sync failed.

          Please investigate and fix the failure, then update the appropriate branch.

          Context:
          - Workflow run: $RUN_URL
          - Default branch: master
          - Dev branch: dev
          - Upstream: https://github.com/1jehuang/jcode master
          - Validation command: \`nix develop --command cargo build --profile selfdev -p jcode --bin jcode\`

          Desired behavior:
          1. Keep \`origin/master\` as upstream-compatible plus the flake/workflow support commits.
          2. Only update \`origin/master\` after the upstream merge builds successfully.
          3. Rebase \`origin/dev\` onto the validated \`origin/master\`.
          4. Only force-push \`origin/dev\` after the rebased branch builds successfully.

          If this issue is assigned to GitHub Copilot coding agent, please open a PR with the fix.
          EOF

          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body-file "$body_file"
            issue="$existing"
          else
            issue_url=$(gh issue create --title "$title" --body-file "$body_file")
            issue="${issue_url##*/}"
          fi

          # Best-effort: works only when GitHub Copilot coding agent is enabled for this repository/account.
          gh issue edit "$issue" --add-assignee copilot || true
